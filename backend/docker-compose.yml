services:
  mall-follow-mysql:
    image: mysql:9.0
    container_name: mall-follow-mysql
#    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: installments
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/monitoring/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:9.5.2
    container_name: grafana
    ports:
      - "3005:3000"
    restart: unless-stopped
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/monitoring/grafana/provisioning/datasources