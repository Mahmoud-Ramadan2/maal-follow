profit.distribution.undoDate.invalid =  Undoing profit distribution is only allowed within 5 days after distribution (you can undo until the last hour on the fifth day after distribution)
profit.distribution.alreadyDistributed=Profit has already been distributed for this distribution, cannot modify or delete