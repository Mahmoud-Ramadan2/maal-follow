# رسائل وحدة توزيع الأرباح

# رسائل التحقق
profit.distribution.monthYear.format=يجب أن يكون الشهر والسنة بتنسيق yyyy-MM
profit.distribution.id.required=مطلوب رقم توزيع الأرباح
profit.distribution.status.required=حالة توزيع الأرباح مطلوبة
profit.distribution.monthYear.invalid=الشهر والسنة غير صالحين
profit.distribution.managementFee.invalid=نسبة العمولة الإدارية يجب أن تكون بين 0 و 100
profit.distribution.zakat.invalid=نسبة الزكاة يجب أن تكون بين 0 و 100
profit.distribution.percentages.sum.invalid=نسبة العمولة الإدارية ونسبة الزكاة لا يجب أن تزيد عن 100
profit.distribution.distributable.invalid=الربح القابل للتوزيع يجب ألا يكون سالبًا
profit.distribution.totalProfit.invalid=إجمالي الربح يجب ألا يكون سالبًا

# رسائل استجابات الـ API
profit.distribution.created=تم إنشاء توزيع الأرباح بنجاح
profit.distribution.updated=تم تحديث توزيع الأرباح بنجاح
profit.distribution.calculated=تم حساب الأرباح بنجاح
profit.distribution.distributed=تم توزيع الأرباح بنجاح
profit.distribution.locked=تم قفل توزيع الأرباح بنجاح
profit.distribution.alreadyGenerated=تم بالفعل إنشاء الأرباح لهذا التوزيع

# رسائل الأخطاء
profit.distribution.not.found=لم يتم العثور على توزيع الأرباح
profit.distribution.calculation.failed=فشل في حساب الأرباح
profit.distribution.distribution.failed=فشل في توزيع الأرباح
profit.distribution.lock.failed=فشل في قفل التوزيع
profit.distribution.notDistributed=يجب توزيع الربح قبل أن يمكن قفله
profit.distribution.recalculateAfterDistribution.notAllowed=لا يمكن إعادة الحساب بعد التوزيع
profit.distribution.notCalculated=يجب حساب الربح قبل أن يمكن توزيعه
profit.distribution.monthImmutable=لا يمكن تغيير الشهر والسنة بعد الإنشاء

# رسائل الحالة
profit.distribution.status.CREATED=تم الإنشاء
profit.distribution.status.CALCULATED=تم الحساب
profit.distribution.status.DISTRIBUTED=تم التوزيع
profit.distribution.status.LOCKED=مقفَل
profit.distribution.status.CANCELED=ملغي

profit.distribution.distributionDate.invalid = لايمكن توزيع الأرباح قبل نهاية الشهر او بعده ب 5 ايام(يمكنك التوزيع بعد الساعة 20 في اخر يوم في الشهر حتى اخر دقيقة في اليوم الخامس من الشهر التالي) 
profit.distribution.undoNotAllowed=لا يمكن التراجع عن توزيع الأرباح اذا تم الدفع لأي شريك 
profit.distribution.undoDate.invalid = التراجع عن توزيع الأرباح مسموح فقط خلال 5 أيام بعد التوزيع (يمكنك التراجع حتى اخر ساعة في اليوم الخامس بعد التوزيع)
profit.distribution.alreadyDistributed=تم بالفعل توزيع الأرباح لهذا التوزيع، ربما تسطيع حذفه ثم اعادة التوزيع اذا كان مسموح