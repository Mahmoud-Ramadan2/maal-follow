spring.application.name=Nagieb
server.port=8080

# locale config
#spring.web.locale=ar
#spring.web.locale-resolver=accept-header

#database config
#spring.datasource.url=jdbc:mysql://localhost:3306/installments?useSSL=false&serverTimezone=UTC
#spring.datasource.username=root
#spring.datasource.password=ldapsso
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# new config Database version: 9.0.1
#spring.datasource.url=jdbc:mysql://localhost:3307/installments?useSSL=false&serverTimezone=UTC
spring.datasource.url=jdbc:mysql://localhost:3307/installments?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
#This ensures that Hibernate uses features and optimizations specific to MySQL 8.0
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.flyway.baseline-onmigrate=true
#spring.flyway.validate-migration-naming=true

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# HikariCP settings
logging.level.com.zaxxer.hikari=WARN

# Virtual threads settings
#spring.threads.virtual.enabled=true

# JMX settings
spring.jmx.enabled=true
# Actuator settings
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
