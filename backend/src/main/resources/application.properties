spring.application.name=Maal Flow
server.port=8080
spring.profiles.active = ${SPRING_PROFILES_ACTIVE:dev}

# locale config
#spring.web.locale=ar
#spring.web.locale-resolver=accept-header

#database config

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#This ensures that Hibernate uses features and optimizations specific to MySQL 8.0
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=none

spring.flyway.baseline-onmigrate=true
#spring.flyway.validate-migration-naming=true

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# File upload settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# HikariCP settings
logging.level.com.zaxxer.hikari=WARN
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Virtual threads settings
#spring.threads.virtual.enabled=true

# JMX settings
spring.jmx.enabled=true
# Actuator settings
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true

# Security settings (Phase 1 scaffolding)
jwt.secret=${JWT_SECRET:U3ByaW5nQm9vdDNNYWFsRmxvd1BoYXNlMUJhc2VsaW5lU2VjcmV0S2V5Rm9ySFM1MTI=}
jwt.expiration=${JWT_EXPIRATION_MS:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION_MS:1209600000}
security.jwt.issuer=${SECURITY_JWT_ISSUER:maal-flow}
#security.cors.allowed-origins=${SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000}

